<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Taxonomy AI - Simple Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0d11;
            color: white;
        }

        .glass {
            background: rgba(21, 25, 33, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12">
            <h1 class="text-3xl font-bold text-blue-400">Enterprise Taxonomy AI</h1>
            <p class="text-gray-500">Simple Dashboard for Processing & Download</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Upload Section -->
            <section class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">Upload New File</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Job Type</label>
                    <select id="job_type" class="w-full bg-black/40 border border-white/10 rounded-lg p-2">
                        <option value="training">Training (Generate Rules)</option>
                        <option value="inference">Inference (Classify Data)</option>
                    </select>
                </div>
                <div class="mb-6">
                    <input type="file" id="file_input"
                        class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>
                <button onclick="uploadFile()" id="upload_btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors">
                    Start Processing
                </button>
            </section>

            <!-- Status Section -->
            <section class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">Recent Jobs</h2>
                <div id="job_list" class="space-y-4">
                    <p class="text-gray-500 italic text-sm">Fetching jobs...</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8080/api";

        async function fetchJobs() {
            try {
                const res = await fetch(`${API_BASE}/status/`);
                const data = await res.json();
                const list = document.getElementById('job_list');
                list.innerHTML = "";

                if (data.length === 0) {
                    list.innerHTML = `<p class="text-gray-600 text-sm">No jobs found.</p>`;
                    return;
                }

                data.forEach(job => {
                    const progress = job.row_count > 0 ? Math.round((job.processed_rows / job.row_count) * 100) : 0;
                    const card = document.createElement('div');
                    card.className = "bg-black/20 p-4 rounded-xl border border-white/5";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="font-bold text-sm">${job.file_name}</div>
                                <div class="text-[10px] text-gray-500 uppercase">${job.mode} | ${job.batch_id.slice(0, 8)}</div>
                            </div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded ${job.status === 'COMPLETED' ? 'bg-green-500/20 text-green-400' : 'bg-blue-500/20 text-blue-400'}">
                                ${job.status}
                            </span>
                        </div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mb-2">
                            <div class="progress-bar bg-blue-500 h-full" style="width: ${progress}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-500 uppercase">
                            <span>Progress: ${progress}%</span>
                            <span>Rows: ${job.row_count}</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file_input');
            const jobType = document.getElementById('job_type').value;
            const btn = document.getElementById('upload_btn');

            if (!fileInput.files[0]) {
                alert("Please select a file.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Uploading...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${API_BASE}/upload/${jobType}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                console.log("Job started:", data);
                fileInput.value = "";
                fetchJobs();
            } catch (e) {
                alert("Upload failed. Check console.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Start Processing";
            }
        }

        setInterval(fetchJobs, 2000);
        fetchJobs();
    </script>
</body>

</html>
